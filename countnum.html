<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>와펜마을 감씨🍊 글자 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #fff5ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px;
    }

    h1 {
      font-size: 1.8rem;
      color: #c45c00;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #d4844a;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 24px rgba(196,92,0,0.09);
    }

    textarea {
      width: 100%;
      border: 2px solid #f5ddc8;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.2rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
      color: #222;
    }

    textarea:focus { border-color: #e07a30; }
    textarea::placeholder { font-size: 0.95rem; }

    .clear-btn {
      margin-top: 10px;
      background: none;
      border: 1px solid #d0d6f5;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { background: #fff0e4; color: #e07a30; border-color: #e07a30; }

    .results {
      margin-top: 24px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .results.visible { display: flex; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #c8956a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      min-width: 100px;
      background: #fff5ec;
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-box .num {
      font-size: 2rem;
      font-weight: 700;
      color: #c45c00;
      line-height: 1.1;
    }

    .stat-box .label {
      font-size: 0.8rem;
      color: #d4844a;
      margin-top: 4px;
    }

    .stat-box.accent .num { color: #e05b8e; }
    .stat-box.accent2 .num { color: #5b9ee1; }
    .stat-box.accent3 .num { color: #5bc89e; }
    .stat-box.accent4 .num { color: #e0a85b; }

    .divider {
      border: none;
      border-top: 1px solid #eef0f9;
    }

    .jamo-section {
      background: #fef6ef;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .jamo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .jamo-chip {
      background: #fff;
      border: 1.5px solid #f5ddc8;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 1rem;
      color: #333;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .jamo-chip .cnt {
      background: #e07a30;
      color: #fff;
      border-radius: 5px;
      font-size: 0.7rem;
      padding: 1px 5px;
      font-weight: 700;
    }

    .jamo-chip.vowel .cnt { background: #e05b8e; }

    .empty-msg {
      color: #b0b8d0;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0;
    }

    .breakdown-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      padding: 6px 10px;
      background: #fff5ec;
      border-radius: 8px;
    }

    .breakdown-item .char { font-size: 1.1rem; font-weight: 700; color: #c45c00; min-width: 28px; }
    .breakdown-item .arrow { color: #b0b8d0; }
    .breakdown-item .parts { display: flex; gap: 5px; flex-wrap: wrap; }

    .part-badge {
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .part-badge.cho { background: #fce9d8; color: #c45c00; }
    .part-badge.jung { background: #ffe8f2; color: #c0366a; }
    .part-badge.jong { background: #e8fff5; color: #1a8a5a; }
    .part-badge.con { background: #fce9d8; color: #c45c00; }
    .part-badge.vow { background: #ffe8f2; color: #c0366a; }
  </style>
</head>
<body>
  <h1>와펜마을 감씨🍊<br>글자 계산기</h1>
  <p class="subtitle">한글 / 영어 단어의 자음·모음을 분해해 드려요</p>

  <div class="card">
    <textarea id="input" placeholder="분석할 단어나 문장을 입력하세요&#10;예) 안녕하세요 / hello" oninput="analyze()"></textarea>
    <button class="clear-btn" onclick="clearInput()">지우기</button>

    <div class="results" id="results">
      <div class="section-title">전체 요약</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="num" id="totalChars">0</div>
          <div class="label">전체 글자</div>
        </div>
        <div class="stat-box accent">
          <div class="num" id="totalCons">0</div>
          <div class="label">자음 수</div>
        </div>
        <div class="stat-box accent2">
          <div class="num" id="totalVows">0</div>
          <div class="label">모음 수</div>
        </div>
        <div class="stat-box accent3">
          <div class="num" id="totalJamo">0</div>
          <div class="label">총 자모/알파벳</div>
        </div>
      </div>

      <hr class="divider" />

      <div id="koSection" style="display:none">
        <div class="section-title" style="margin-bottom:8px">한글 자모 분포</div>
        <div class="jamo-section">
          <div class="section-title">자음</div>
          <div class="jamo-grid" id="consGrid"></div>
          <div class="section-title" style="margin-top:12px">모음</div>
          <div class="jamo-grid" id="vowsGrid"></div>
        </div>
      </div>

      <div id="enSection" style="display:none">
        <div class="section-title" style="margin-bottom:8px">영어 알파벳 분포</div>
        <div class="jamo-section">
          <div class="section-title">자음 (Consonants)</div>
          <div class="jamo-grid" id="enConsGrid"></div>
          <div class="section-title" style="margin-top:12px">모음 (Vowels)</div>
          <div class="jamo-grid" id="enVowsGrid"></div>
        </div>
      </div>

      <hr class="divider" />

      <div>
        <div class="section-title" style="margin-bottom:8px">글자별 분해</div>
        <div class="breakdown-row" id="breakdown"></div>
      </div>
    </div>

    <div class="empty-msg" id="emptyMsg">위에 텍스트를 입력하면 분석 결과가 나타납니다.</div>
  </div>

  <script>
    // 초성 19개
    const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    // 중성 21개
    const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
    // 종성 28개 (0번은 없음)
    const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

    // 겹받침 → 자음 2개로 분해
    const JONG_DECOMP = {
      'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],
      'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],'ㄼ':['ㄹ','ㅂ'],
      'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],
      'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ']
    };

    // 모음 → 기본 모음(ㅏㅑㅣㅐㅔㅖ) 분해 테이블
    const VOW_DECOMP = {
      'ㅏ': {'ㅏ':1},
      'ㅐ': {'ㅐ':1},
      'ㅑ': {'ㅑ':1},
      'ㅒ': {'ㅑ':1, 'ㅣ':1},
      'ㅓ': {'ㅏ':1},
      'ㅔ': {'ㅔ':1},
      'ㅕ': {'ㅑ':1},
      'ㅖ': {'ㅖ':1},
      'ㅗ': {'ㅏ':1},
      'ㅘ': {'ㅏ':2},
      'ㅙ': {'ㅏ':1, 'ㅐ':1},
      'ㅚ': {'ㅏ':1, 'ㅣ':1},
      'ㅛ': {'ㅑ':1},
      'ㅜ': {'ㅏ':1},
      'ㅝ': {'ㅏ':2},
      'ㅞ': {'ㅏ':1, 'ㅔ':1},
      'ㅟ': {'ㅏ':1, 'ㅣ':1},
      'ㅠ': {'ㅑ':1},
      'ㅡ': {'ㅏ':1},
      'ㅢ': {'ㅏ':1, 'ㅣ':1},
      'ㅣ': {'ㅣ':1},
    };

    // 단독 자모 범위
    const JAMO_CONS_START = 0x3131; // ㄱ
    const JAMO_CONS_END   = 0x314E; // ㅎ
    const JAMO_VOW_START  = 0x314F; // ㅏ
    const JAMO_VOW_END    = 0x3163; // ㅣ

    const EN_VOWELS = new Set(['a','e','i','o','u']);

    function decomposeHangul(ch) {
      const code = ch.charCodeAt(0);
      // 완성형 한글
      if (code >= 0xAC00 && code <= 0xD7A3) {
        const offset = code - 0xAC00;
        const jong = offset % 28;
        const jung = Math.floor(offset / 28) % 21;
        const cho  = Math.floor(offset / 28 / 21);
        return { type: 'syllable', cho: CHO[cho], jung: JUNG[jung], jong: JONG[jong] };
      }
      // 단독 자음
      if (code >= JAMO_CONS_START && code <= JAMO_CONS_END) {
        return { type: 'jamo_cons', char: ch };
      }
      // 단독 모음
      if (code >= JAMO_VOW_START && code <= JAMO_VOW_END) {
        return { type: 'jamo_vow', char: ch };
      }
      return null;
    }

    function analyze() {
      const raw = document.getElementById('input').value;
      const resultsEl = document.getElementById('results');
      const emptyEl   = document.getElementById('emptyMsg');

      if (!raw.trim()) {
        resultsEl.classList.remove('visible');
        emptyEl.style.display = '';
        return;
      }

      resultsEl.classList.add('visible');
      emptyEl.style.display = 'none';

      let totalCons = 0, totalVows = 0;
      const koConsMap = {}, koVowMap = {};
      const enConsMap = {}, enVowMap = {};
      const breakdownItems = [];
      let totalChars = 0;
      let hasKo = false, hasEn = false;

      for (const ch of raw) {
        const code = ch.charCodeAt(0);

        // 한글
        const ko = decomposeHangul(ch);
        if (ko) {
          hasKo = true;
          totalChars++;

          if (ko.type === 'syllable') {
            const parts = [];
            // 초성
            koConsMap[ko.cho] = (koConsMap[ko.cho] || 0) + 1;
            totalCons++;
            parts.push({ label: ko.cho, cls: 'cho' });
            // 중성 → 기본 모음으로 분해
            const jungDecomp = VOW_DECOMP[ko.jung] || {'ㅏ':1};
            for (const [v, cnt] of Object.entries(jungDecomp)) {
              koVowMap[v] = (koVowMap[v] || 0) + cnt;
              totalVows += cnt;
            }
            parts.push({ label: ko.jung, cls: 'jung' });
            // 종성
            if (ko.jong) {
              const decomp = JONG_DECOMP[ko.jong];
              if (decomp) {
                decomp.forEach(c => { koConsMap[c] = (koConsMap[c] || 0) + 1; totalCons++; });
                parts.push({ label: ko.jong, cls: 'jong' });
              } else {
                koConsMap[ko.jong] = (koConsMap[ko.jong] || 0) + 1;
                totalCons++;
                parts.push({ label: ko.jong, cls: 'jong' });
              }
            }
            breakdownItems.push({ char: ch, parts });
          } else if (ko.type === 'jamo_cons') {
            koConsMap[ko.char] = (koConsMap[ko.char] || 0) + 1;
            totalCons++;
            breakdownItems.push({ char: ch, parts: [{ label: ko.char, cls: 'cho' }] });
          } else {
            const jamoDecomp = VOW_DECOMP[ko.char] || {'ㅏ':1};
            for (const [v, cnt] of Object.entries(jamoDecomp)) {
              koVowMap[v] = (koVowMap[v] || 0) + cnt;
              totalVows += cnt;
            }
            breakdownItems.push({ char: ch, parts: [{ label: ko.char, cls: 'jung' }] });
          }
          continue;
        }

        // 영어
        if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) {
          hasEn = true;
          totalChars++;
          const lower = ch.toLowerCase();
          const parts = [];
          if (EN_VOWELS.has(lower)) {
            enVowMap[lower] = (enVowMap[lower] || 0) + 1;
            totalVows++;
            parts.push({ label: ch, cls: 'vow' });
          } else {
            enConsMap[lower] = (enConsMap[lower] || 0) + 1;
            totalCons++;
            parts.push({ label: ch, cls: 'con' });
          }
          breakdownItems.push({ char: ch, parts });
        }
        // 숫자/공백/특수문자는 집계에서 제외
      }

      document.getElementById('totalChars').textContent = totalChars;
      document.getElementById('totalCons').textContent  = totalCons;
      document.getElementById('totalVows').textContent  = totalVows;
      document.getElementById('totalJamo').textContent  = totalCons + totalVows;

      // 한글 섹션
      const koSec = document.getElementById('koSection');
      if (hasKo) {
        koSec.style.display = '';
        renderChips('consGrid', koConsMap, 'cons');
        renderChips('vowsGrid', koVowMap, 'vowel');
      } else {
        koSec.style.display = 'none';
      }

      // 영어 섹션
      const enSec = document.getElementById('enSection');
      if (hasEn) {
        enSec.style.display = '';
        renderChips('enConsGrid', enConsMap, 'cons');
        renderChips('enVowsGrid', enVowMap, 'vowel');
      } else {
        enSec.style.display = 'none';
      }

      // 글자별 분해
      const bd = document.getElementById('breakdown');
      if (breakdownItems.length === 0) {
        bd.innerHTML = '<div class="empty-msg">분해할 한글/영어 글자가 없습니다.</div>';
      } else {
        bd.innerHTML = breakdownItems.map(item =>
          `<div class="breakdown-item">
            <span class="char">${item.char}</span>
            <span class="arrow">→</span>
            <span class="parts">${item.parts.map(p =>
              `<span class="part-badge ${p.cls}">${p.label}</span>`
            ).join('')}</span>
          </div>`
        ).join('');
      }
    }

    function renderChips(gridId, map, type) {
      const grid = document.getElementById(gridId);
      const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]);
      if (sorted.length === 0) {
        grid.innerHTML = '<span style="color:#b0b8d0;font-size:0.85rem">없음</span>';
        return;
      }
      grid.innerHTML = sorted.map(([ch, cnt]) =>
        `<div class="jamo-chip ${type}">
          <span>${ch}</span>
          <span class="cnt">${cnt}</span>
        </div>`
      ).join('');
    }

    function clearInput() {
      document.getElementById('input').value = '';
      analyze();
    }
  </script>
</body>
</html>
